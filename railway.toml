# Railway deployment config
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand НЕ задаём намеренно — Railway тогда использует CMD из
# Dockerfile, где `exec uvicorn ... --port $PORT` выполняется через shell
# и переменная раскрывается правильно.
#
# Если задать startCommand здесь — Railway исполняет его через execve()
# без shell, и $PORT попадает в uvicorn как литерал "$PORT" → crash:
#   Error: Invalid value for '--port': '$PORT' is not a valid integer.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Плагины подключаются через Railway UI (Postgres add-on)
# DATABASE_URL будет проставлен автоматически
