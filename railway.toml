# Railway deployment config
# https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway сам добавит PORT env var
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT --workers 1 --proxy-headers"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
healthcheckPath = "/api/health"
healthcheckTimeout = 30

# Плагины подключаются через Railway UI (Postgres add-on)
# DATABASE_URL будет проставлен автоматически
