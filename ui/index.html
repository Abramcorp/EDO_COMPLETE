<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>USN_COMPLETE — генератор декларации</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2027;
    --surface-2: #242b33;
    --border: #323a45;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --success: #3fb950;
    --danger: #f85149;
    --warning: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 32px 20px;
  }
  h1 {
    margin: 0 0 8px;
    font-weight: 600;
    font-size: 24px;
  }
  .subtitle {
    color: var(--text-dim);
    margin-bottom: 32px;
    font-size: 14px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin: 0 0 16px;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .row:last-child { margin-bottom: 0; }
  .field { display: flex; flex-direction: column; }
  label {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 4px;
    font-weight: 500;
  }
  input[type="text"], input[type="number"], select {
    background: var(--surface-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type="file"] {
    background: var(--surface-2);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    padding: 12px;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    width: 100%;
  }
  input[type="file"]:hover { border-color: var(--accent); }
  .checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }
  .checkbox input { width: 16px; height: 16px; }
  button {
    background: var(--accent);
    color: #0d1117;
    border: none;
    padding: 12px 24px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    width: 100%;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .progress-wrapper { display: none; margin-top: 16px; }
  .progress-wrapper.active { display: block; }
  .progress-bar {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
  }
  .progress-fill.complete { background: var(--success); }
  .progress-fill.failed { background: var(--danger); }
  .stage-label {
    font-size: 13px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  .result-box {
    display: none;
    margin-top: 16px;
    padding: 16px;
    border-radius: 6px;
    font-size: 14px;
  }
  .result-box.success {
    display: block;
    background: rgba(63, 185, 80, 0.1);
    border: 1px solid var(--success);
    color: var(--success);
  }
  .result-box.error {
    display: block;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--danger);
    color: var(--danger);
  }
  .result-box a {
    color: inherit;
    font-weight: 600;
    text-decoration: underline;
  }
</style>
</head>
<body>
<div class="container">
  <h1>USN_COMPLETE</h1>
  <p class="subtitle">Генератор подписанной декларации УСН 6% (КНД 1152017)</p>

  <form id="form">
    <div class="card">
      <h2 class="section-title">Налогоплательщик</h2>
      <div class="row">
        <div class="field">
          <label>ИНН</label>
          <input type="text" name="inn" required pattern="\d{10}|\d{12}" placeholder="770123456789" />
        </div>
        <div class="field">
          <label>Код ИФНС</label>
          <input type="text" name="ifns_code" required pattern="\d{4}" placeholder="7701" />
        </div>
      </div>
      <div class="row">
        <div class="field" style="grid-column: 1 / -1;">
          <label>ФИО</label>
          <input type="text" name="fio" required placeholder="Иванов Иван Иванович" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>ОКТМО</label>
          <input type="text" name="oktmo" required pattern="\d{8}|\d{11}" placeholder="45382000" />
        </div>
        <div class="field">
          <label>Налоговый период (год)</label>
          <input type="number" name="tax_period_year" required min="2020" max="2030" value="2024" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Страховые взносы (накопительно, ₽)</h2>
      <div class="row">
        <div class="field">
          <label>На 31 марта</label>
          <input type="number" name="c_q1" value="0" min="0" step="0.01" />
        </div>
        <div class="field">
          <label>На 30 июня</label>
          <input type="number" name="c_half_year" value="0" min="0" step="0.01" />
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>На 30 сентября</label>
          <input type="number" name="c_nine_months" value="0" min="0" step="0.01" />
        </div>
        <div class="field">
          <label>На 31 декабря</label>
          <input type="number" name="c_year" value="49500" min="0" step="0.01" />
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Работники</h2>
      <div class="checkbox">
        <input type="checkbox" id="has_employees" name="has_employees" />
        <label for="has_employees" style="margin: 0; color: var(--text);">Есть работники</label>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Файлы</h2>
      <div class="field" style="margin-bottom: 12px;">
        <label>1С-выписка (.txt) *</label>
        <input type="file" name="statement" accept=".txt" required />
      </div>
      <div class="field">
        <label>Чеки ОФД (.xlsx) — опционально</label>
        <input type="file" name="ofd" accept=".xlsx,.xls" />
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">Штампы ЭДО</h2>
      <div class="checkbox">
        <input type="checkbox" id="stamps_enabled" name="stamps_enabled" checked />
        <label for="stamps_enabled" style="margin: 0; color: var(--text);">Наложить штампы ЭДО</label>
      </div>
      <div class="field">
        <label>Оператор</label>
        <select name="operator">
          <option value="kontur">Контур.Эльба</option>
          <option value="tensor">СБИС / Тензор</option>
        </select>
      </div>
    </div>

    <button type="submit" id="submit-btn">Сгенерировать декларацию</button>

    <div class="progress-wrapper" id="progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="stage-label">
        <span id="stage-text">Инициализация…</span>
        <span id="progress-text">0%</span>
      </div>
    </div>

    <div class="result-box" id="result"></div>
  </form>
</div>

<script>
const STAGE_LABELS = {
  initializing: "Инициализация",
  parsing_statement: "Разбор 1С-выписки",
  parsing_ofd: "Разбор чеков ОФД",
  classifying: "Классификация операций",
  calculating_tax: "Расчёт налога",
  rendering_declaration: "Рендер декларации",
  fetching_ifts: "Получение данных ИФНС",
  rendering_stamps: "Наложение штампов",
  complete: "Готово",
};

const form = document.getElementById('form');
const submitBtn = document.getElementById('submit-btn');
const progress = document.getElementById('progress');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');
const stageText = document.getElementById('stage-text');
const result = document.getElementById('result');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  submitBtn.disabled = true;
  progress.classList.add('active');
  progressFill.classList.remove('complete', 'failed');
  result.className = 'result-box';
  result.innerHTML = '';

  try {
    const fd = new FormData(form);
    const meta = {
      taxpayer: {
        inn: fd.get('inn'),
        fio: fd.get('fio'),
        oktmo: fd.get('oktmo'),
        ifns_code: fd.get('ifns_code'),
      },
      tax_period_year: parseInt(fd.get('tax_period_year')),
      contributions: {
        q1: fd.get('c_q1'),
        half_year: fd.get('c_half_year'),
        nine_months: fd.get('c_nine_months'),
        year: fd.get('c_year'),
      },
      personnel: {
        has_employees: fd.get('has_employees') === 'on',
      },
      stamps: {
        enabled: fd.get('stamps_enabled') === 'on',
        operator: fd.get('operator'),
      },
    };

    const payload = new FormData();
    payload.append('meta', JSON.stringify(meta));
    payload.append('statement', fd.get('statement'));
    if (fd.get('ofd') && fd.get('ofd').size > 0) {
      payload.append('ofd', fd.get('ofd'));
    }

    const resp = await fetch('/api/complete/create-declaration', {
      method: 'POST',
      body: payload,
    });

    if (!resp.ok) {
      const errBody = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${errBody}`);
    }

    const { job_id, status_url, result_url } = await resp.json();

    // Poll
    let finalState = null;
    for (let i = 0; i < 300; i++) {
      await sleep(1000);
      const r = await fetch(status_url);
      const state = await r.json();
      progressFill.style.width = state.progress_pct + '%';
      progressText.textContent = state.progress_pct + '%';
      stageText.textContent = STAGE_LABELS[state.stage] || state.stage;
      if (state.status === 'complete' || state.status === 'failed') {
        finalState = state;
        break;
      }
    }

    if (!finalState) throw new Error('Таймаут: задача не завершилась за 5 минут');

    if (finalState.status === 'failed') {
      progressFill.classList.add('failed');
      result.className = 'result-box error';
      result.innerHTML = `<strong>Ошибка (${finalState.error.code}):</strong> ${finalState.error.message}<br><small>Стадия: ${finalState.error.stage}</small>`;
    } else {
      progressFill.classList.add('complete');
      result.className = 'result-box success';
      result.innerHTML = `<strong>Готово!</strong> <a href="${finalState.result_url}" target="_blank">Скачать PDF</a>`;
    }
  } catch (err) {
    progressFill.classList.add('failed');
    result.className = 'result-box error';
    result.innerHTML = `<strong>Ошибка:</strong> ${err.message}`;
  } finally {
    submitBtn.disabled = false;
  }
});

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
